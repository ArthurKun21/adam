name: ci
on:
  push:
    branches:
      - master
      - dev
  pull_request:
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  JAVA_DISTRO: 'temurin'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}

      - uses: malinskiy/action-android/install-sdk@release/0.1.7
      - name: build & test
        run: ./gradlew assemble test jacocoTestReport
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Build & Test
      - name: archive test results
        if: failure()
        run: (cd adam/build/reports/tests/test; zip -r -X ../../../../../test-result.zip .)
      - name: Save test output
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-result
          path: test-result.zip
      - name: archive test coverage
        run: (cd adam/build/reports/jacoco/test/html; zip -r -X ../../../../../test-coverage.zip .)
      - name: Save coverage output
        uses: actions/upload-artifact@v6
        with:
          name: test-coverage
          path: test-coverage.zip
      - name: codecov unit tests
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./adam/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    timeout-minutes: 30
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api: [ 24, 25, 26, 28, 29, 30, 31, 33, 34, 35 ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
      
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :adam:integrationTest

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/integrationTest/TEST-*.xml'
          check_name: Integration Test API ${{ matrix.api }}

      - name: Generate integration code coverage report
        run: ./gradlew :adam:jacocoIntegrationTestReport

      - name: archive integration test results
        if: failure()
        run: (cd adam/build/reports/tests/integrationTest; zip -r -X ../../../../../integration-test-result.zip .)

      - name: Save integration test output
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: integration-test-${{ matrix.api }}-result
          path: integration-test-${{ matrix.api }}-result.zip

      - name: archive test coverage
        run: (cd adam/build/reports/jacoco/jacocoIntegrationTestReport/html; zip -r -X ../../../../../../integration-test-coverage.zip .)

      - name: Save coverage output
        uses: actions/upload-artifact@v6
        with:
          name: integration-test-${{ matrix.api }}-coverage
          path: integration-test-coverage.zip

      - name: Save logcat output
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: logcat-${{ matrix.api }}
          path: artifacts/logcat.log

      - name: codecov integartion tests
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./adam/build/reports/jacoco/jacocoIntegrationTestReport/jacocoIntegrationTestReport.xml
          flags: integration
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
